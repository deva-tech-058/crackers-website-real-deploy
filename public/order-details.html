<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details | Mr.A Crackers</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Golden/Purple Theme Variables */
    :root {
      --bg-primary: #0a0f1e;
      --bg-secondary: #151e2f;
      --bg-card: #1a2538;
      --text-primary: #ffffff;
      --text-secondary: #e2e8f0;
      --text-muted: #a0b3d9;
      --border-color: #2d3a5e;
      --accent-primary: #fbbf24;
      --accent-secondary: #c084fc;
      --accent-gradient: linear-gradient(135deg, #fbbf24 0%, #c084fc 100%);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gold: #fbbf24;
      --purple: #c084fc;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Offers Banner */
    .offers-banner {
      background: var(--accent-gradient);
      color: var(--bg-primary);
      text-align: center;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Navbar */
    .navbar {
      background: rgba(20, 20, 40, 0.98);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 40px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 70px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .nav-item {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.3s;
      line-height: 1;
    }

    .nav-item:hover {
      color: var(--gold);
    }

    .nav-login-btn {
      background: var(--accent-gradient);
      color: var(--bg-primary) !important;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      text-decoration: none;
    }

    .nav-login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
    }

    .nav-logout-btn {
      background: var(--danger);
      color: white !important;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      text-decoration: none;
    }

    .nav-logout-btn:hover {
      background: #dc2626;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .welcome-user {
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1;
    }

    .orders,
    .cart {
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      transition: all 0.3s;
      background: none;
      border: none;
      padding: 4px;
    }

    .orders:hover,
    .cart:hover {
      color: var(--gold);
      transform: translateY(-2px);
    }

    .cart-count,
    .orders-count {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--accent-gradient);
      color: var(--bg-primary);
      font-size: 9px;
      font-weight: 700;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Main Layout */
    .cart-layout {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 30px;
    }

    .cart-section {
      background: var(--bg-card);
      border-radius: 24px;
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .section-head {
      padding: 25px 30px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      background: var(--bg-secondary);
    }

    .section-head h1 {
      font-size: 28px;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-head p {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 5px;
    }

    .continue-link {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      padding: 10px 20px;
      border: 1px solid var(--border-color);
      border-radius: 25px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .continue-link:hover {
      border-color: var(--gold);
      background: rgba(251, 191, 36, 0.1);
    }

    .continue-link::before {
      content: '←';
      font-size: 18px;
    }

    /* Order Info */
    #orderInfo {
      padding: 30px;
    }

    #orderInfo p {
      color: var(--text-muted);
      font-size: 16px;
      text-align: center;
      padding: 40px;
    }

    #orderInfo a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }

    #orderInfo a:hover {
      text-decoration: underline;
    }

    /* Order Record */
    .order-record {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
      transition: all 0.3s;
    }

    .order-record:hover {
      border-color: var(--gold);
      box-shadow: 0 10px 25px rgba(251, 191, 36, 0.1);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .order-header h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .order-status {
      background: var(--success);
      color: white;
      padding: 6px 15px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
    }

    .order-meta {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    .order-record h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .order-record h3 i {
      color: var(--gold);
    }

    .order-record h4 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .order-record h4 i {
      color: var(--gold);
    }

    /* Table */
    .table-container {
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .order-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-primary);
      border-radius: 12px;
      overflow: hidden;
    }

    .order-table th {
      background: var(--bg-card);
      color: var(--gold);
      font-weight: 600;
      font-size: 14px;
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .order-table td {
      padding: 15px;
      color: var(--text-secondary);
      font-size: 14px;
      border-bottom: 1px solid var(--border-color);
    }

    .order-table tr:last-child td {
      border-bottom: none;
    }

    .order-table tr:hover td {
      background: rgba(251, 191, 36, 0.05);
    }

    /* Order Total */
    .order-total {
      text-align: right;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 20px 0;
      padding: 15px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }

    .order-total span {
      color: var(--gold);
      font-size: 22px;
      margin-left: 10px;
    }

    /* Address & Payment */
    .order-address,
    .order-payment {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-top: 15px;
    }

    .order-address p,
    .order-payment p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.8;
      text-align: left !important;
      padding: 0 !important;
    }

    /* Divider */
    hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 30px 0;
    }

    /* No Orders Message */
    .no-orders {
      text-align: center;
      padding: 60px 30px;
    }

    .no-orders i {
      font-size: 60px;
      color: var(--gold);
      opacity: 0.5;
      margin-bottom: 20px;
    }

    .no-orders p {
      color: var(--text-muted);
      font-size: 16px;
    }

    .no-orders a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: var(--accent-gradient);
      color: var(--bg-primary);
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .no-orders a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(251, 191, 36, 0.3);
    }

    /* Responsive Design */
    @media (max-width: 992px) {
      .navbar {
        padding: 12px 25px;
      }

      .nav-links {
        gap: 20px;
      }

      .logo {
        font-size: 22px;
      }
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 10px 20px;
        height: 60px;
      }

      .nav-links {
        gap: 15px;
      }

      .nav-item {
        font-size: 14px;
      }

      .logo {
        font-size: 22px;
      }

      .nav-login-btn,
      .nav-logout-btn {
        padding: 6px 15px;
        font-size: 13px;
      }

      .cart-layout {
        padding: 0 20px;
        margin: 30px auto;
      }

      .section-head {
        padding: 20px;
      }

      #orderInfo {
        padding: 20px;
      }

      .order-record {
        padding: 20px;
      }

      .order-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .order-table th,
      .order-table td {
        padding: 10px;
        font-size: 13px;
      }

      .order-total {
        font-size: 16px;
      }

      .order-total span {
        font-size: 20px;
      }
    }

    @media (max-width: 576px) {
      .navbar {
        padding: 8px 15px;
        height: 55px;
      }

      .nav-links {
        gap: 10px;
      }

      .nav-item:not(.active):not(.btn) {
        display: none;
      }

      .logo {
        font-size: 20px;
      }

      .orders,
      .cart {
        font-size: 18px;
        padding: 3px;
      }

      .cart-count,
      .orders-count {
        width: 14px;
        height: 14px;
        font-size: 8px;
        top: -3px;
        right: -3px;
      }

      .cart-layout {
        padding: 0 15px;
        margin: 20px auto;
      }

      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .continue-link {
        width: 100%;
        justify-content: center;
      }

      .section-head h1 {
        font-size: 24px;
      }

      .order-record h2 {
        font-size: 18px;
      }

      .order-status {
        font-size: 12px;
        padding: 4px 12px;
      }

      .order-total {
        text-align: left;
      }

      .order-address p,
      .order-payment p {
        font-size: 13px;
      }
    }

    @media (max-width: 360px) {

      .order-table th,
      .order-table td {
        padding: 8px;
        font-size: 12px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--gold);
    }

    /* Touch-friendly */
    button,
    .cart,
    .orders,
    a {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
    <link rel="stylesheet" href="/css/theme.css">

    <script src="/js/api-client.js"></script>
    <script src="/js/shared-navbar.js"></script>
</head>

<body class="page-order-details">
  <div class="offers-banner">
    <i class="fas fa-tag"></i> Diwali Special: 20% OFF on Festival Packs | Limited Stock!
  </div>

  <nav class="navbar">
    <div class="logo" onclick="window.location.href='/'">Mr.A Crackers</div>
    <div class="nav-links">
      <a href="/" class="nav-item">Home</a>
      <a href="/all-products.html" class="nav-item">All Products</a>
      <a href="/login.html" id="loginLink" class="nav-login-btn">Login</a>
      <div class="user-section" id="userSection" hidden>
        <span id="welcomeUser" class="welcome-user"></span>
        <button id="logoutBtn" type="button" class="nav-logout-btn">Logout</button>
      </div>
      <a href="/order-details.html" class="orders" aria-label="Orders">
        <i class="fa-solid fa-box-open"></i>
        <span class="orders-count" id="ordersCount" style="display: none;">0</span>
      </a>
      <a href="/checkout.html" class="cart" aria-label="Cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-count" id="headerCartCount">0</span>
      </a>
    </div>
  </nav>

  <main class="cart-layout">
    <section class="cart-section">
      <div class="section-head">
        <div>
          <h1>Your Orders</h1>
          <p id="orderMeta"></p>
        </div>
        <a class="continue-link" href="/all-products.html">Shop More</a>
      </div>

      <div id="orderInfo"></div>
    </section>
  </main>

  <script src="/js/auth-session.js"></script>
  <script src="/js/navbar-auth.js"></script>
  <script src="/js/cart-utils.js"></script>
  <script>
    let dbOrders = [];
    let localOrders = [];

    async function fetchOrderWithItems(orderId) {
      try {
        const response = await fetch(`/api/orders/${orderId}`);
        if (response.ok) {
          return await response.json();
        }
      } catch (error) {
        console.warn('Could not fetch order details:', error);
      }
      return null;
    }

    async function fetchOrdersFromDB() {
      try {
        const userId = localStorage.getItem('userId');
        if (!userId) {
          dbOrders = [];
          return;
        }

        const url = `/api/orders/user/${userId}`;
        const response = await fetch(url);
        if (response.ok) {
          const orders = await response.json();
          const ordersWithItems = await Promise.all(
            orders.map(async (order) => {
              const orderDetails = await fetchOrderWithItems(order.order_id);
              if (orderDetails && orderDetails.items) {
                return { ...order, items: orderDetails.items };
              }
              return order;
            })
          );
          dbOrders = ordersWithItems;
        }
      } catch (error) {
        console.warn('Could not fetch orders from database:', error);
        dbOrders = [];
      }
    }

    function getLocalOrders() {
      try {
        localOrders = JSON.parse(localStorage.getItem('orders') || '[]');
        return Array.isArray(localOrders) ? localOrders : [];
      } catch {
        return [];
      }
    }

    function toNumberAmount(value) {
      const numeric = Number.parseFloat(String(value ?? '').replace(/,/g, '').trim());
      return Number.isFinite(numeric) ? numeric : 0;
    }

    function resolveItemQuantity(item) {
      const quantity = Number.parseInt(String(item?.quantity ?? ''), 10);
      return Number.isFinite(quantity) && quantity > 0 ? quantity : 1;
    }

    function resolveItemUnitPrice(item) {
      const candidates = [
        item?.price,
        item?.unit_price,
        item?.unitPrice,
        item?.offer_price,
        item?.original_price,
      ];

      for (const candidate of candidates) {
        const value = toNumberAmount(candidate);
        if (value > 0) return value;
      }

      return 0;
    }

    function resolveItemTotal(item) {
      const explicitTotal = toNumberAmount(item?.total_price ?? item?.totalPrice ?? item?.total);
      if (explicitTotal > 0) return explicitTotal;

      return resolveItemUnitPrice(item) * resolveItemQuantity(item);
    }

    function resolveOrderTotal(order, items) {
      const directTotal = toNumberAmount(order?.total_amount ?? order?.total ?? order?.grand_total);
      const computedTotal = (items || []).reduce((sum, item) => sum + resolveItemTotal(item), 0);

      if (directTotal > 0 || computedTotal === 0) {
        return directTotal;
      }

      return computedTotal;
    }

    function formatAmount(value) {
      const amount = toNumberAmount(value);
      if (window.CartUtils) {
        return window.CartUtils.formatCurrency(amount);
      }
      return `\u20B9${amount}`;
    }

    async function renderOrder() {
      const metaEl = document.getElementById('orderMeta');
      const container = document.getElementById('orderInfo');
      metaEl.textContent = '';
      container.innerHTML = '';

      const token = localStorage.getItem('token');
      if (!token) {
        container.innerHTML = '<div class="no-orders"><i class="fas fa-box-open"></i><p>Please <a href="/login.html">log in</a> to view your orders.</p></div>';
        return;
      }

      await fetchOrdersFromDB();
      const localOrderList = getLocalOrders();

      const allOrders = [...dbOrders];
      const dbOrderIds = new Set(dbOrders.map(o => o.order_id));

      localOrderList.forEach(order => {
        if (!dbOrderIds.has(order.id)) {
          allOrders.push({
            order_id: order.id,
            customer_name: order.address?.name || '',
            mobile: order.address?.mobile || '',
            address_line1: order.address?.line1 || '',
            address_line2: order.address?.line2 || '',
            city: order.address?.city || '',
            state: order.address?.state || '',
            pin_code: order.address?.pin || '',
            payment_method: order.paymentMethod || '',
            total_amount: order.total,
            order_date: order.date,
            items: order.items,
            status: 'confirmed'
          });
        }
      });

      allOrders.sort((a, b) => new Date(b.order_date || b.created_at) - new Date(a.order_date || a.created_at));

      if (allOrders.length === 0) {
        container.innerHTML = '<div class="no-orders"><i class="fas fa-box-open"></i><p>No order history found. Start shopping to place your first order!</p><a href="/all-products.html">Browse Products</a></div>';
        return;
      }

      metaEl.textContent = `${allOrders.length} order(s)`;

      let html = '';
      allOrders.forEach((order, idx) => {
        const orderId = order.order_id || order.id;
        const orderDate = order.order_date || order.created_at;
        const items = order.items || [];
        const total = resolveOrderTotal(order, items);
        const paymentMethod = order.payment_method || order.paymentMethod;

        html += `<div class="order-record">`;
        html += `<div class="order-header"><h2><i class="fas fa-receipt"></i> Order #${orderId}</h2><span class="order-status"><i class="fas fa-check-circle"></i> ${order.status || 'Confirmed'}</span></div>`;
        html += `<p class="order-meta"><i class="fas fa-calendar"></i> Placed on ${new Date(orderDate).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })}</p>`;
        html += `<h3><i class="fas fa-shopping-bag"></i> Items</h3>`;
        html += `<div class="table-container"><table class="order-table"><thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>`;

        if (items && items.length > 0) {
          items.forEach(item => {
            const quantity = resolveItemQuantity(item);
            const unitPrice = resolveItemUnitPrice(item);
            const itemTotal = resolveItemTotal(item);
            html += `<tr>
              <td>${item.name || item.product_name || 'Product'}</td>
              <td>${quantity}</td>
              <td>${formatAmount(unitPrice)}</td>
              <td>${formatAmount(itemTotal)}</td>
            </tr>`;
          });
        } else {
          html += `<tr><td colspan="4">No items found</td></tr>`;
        }

        html += `</tbody></table></div>`;
        html += `<div class="order-total">Total Amount: <span>${formatAmount(total)}</span></div>`;

        if (order.address_line1 || order.address) {
          const addr = order.address || {};
          const name = order.customer_name || addr.name || '';
          const line1 = order.address_line1 || addr.line1 || '';
          const line2 = order.address_line2 || addr.line2 || '';
          const city = order.city || addr.city || '';
          const state = order.state || addr.state || '';
          const pin = order.pin_code || addr.pin || '';
          const mobile = order.mobile || addr.mobile || '';

          html += `<div class="order-address"><h4><i class="fas fa-map-marker-alt"></i> Address</h4><p>${name}<br>${line1}${line2 ? ', ' + line2 : ''}<br>${city}, ${state} - ${pin}<br><i class="fas fa-phone"></i> ${mobile}</p></div>`;
        }

        if (paymentMethod) {
          html += `<div class="order-payment"><h4><i class="fas fa-credit-card"></i> Payment Method</h4><p>${paymentMethod}</p></div>`;
        }
        html += `</div>`;

        if (idx < allOrders.length - 1) {
          html += `<hr>`;
        }
      });

      container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderOrder();

      // Update cart count
      if (window.CartUtils) {
        const cart = window.CartUtils.getCart();
        const totalItems = window.CartUtils.getSummary(cart).totalItems;
        document.getElementById('headerCartCount').textContent = totalItems;
      }

      window.addEventListener('auth:changed', renderOrder);
      window.addEventListener('orders:changed', renderOrder);
    });
  </script>
</body>

</html>
