<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Categories</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: #0a0e17;
            color: #fff;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(20, 20, 40, 0.98);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            margin-bottom: 30px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #ffd700;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-links a.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.12);
        }

        .nav-links .logout-btn {
            background: #ff4444;
            color: #fff;
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
        }

        .nav-links .logout-btn:hover {
            background: #ff3333;
        }

        h2 {
            color: #ff8c42;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.4rem;
        }

        form {
            background: #121826;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        input {
            width: 100%;
            padding: 16px 20px;
            margin: 15px 0 0 0;
            border-radius: 8px;
            border: none;
            background: #1a2236;
            color: #fff;
            font-size: 15px;
            font-family: "Poppins", sans-serif;
        }

        input::placeholder {
            color: #888;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 140, 66, 0.4);
            background: #222c40;
        }

        .add-btn {
            background: linear-gradient(135deg, #ff8c42, #ff7a30);
            color: #fff;
            width: 100%;
            padding: 16px 20px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 140, 66, 0.4);
        }

        .table-wrap {
            background: #121826;
            border-radius: 10px;
            overflow-x: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
            table-layout: fixed;
        }

        th,
        td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid #2a344d;
            vertical-align: middle;
            word-wrap: break-word;
        }

        th {
            background: #1a2236;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            color: #ff8c42;
        }

        th:nth-child(1),
        td:nth-child(1),
        th:nth-child(3),
        td:nth-child(3) {
            text-align: center;
        }

        .edit-btn {
            background: linear-gradient(135deg, #f4c430, #e6b800);
            color: #1a0f08;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(244, 196, 48, 0.3);
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244, 196, 48, 0.5);
        }

        @media (max-width: 900px) {
            .navbar {
                padding: 15px 20px;
                gap: 12px;
            }

            .nav-links {
                width: 100%;
                justify-content: flex-end;
                gap: 10px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/theme.css">
    <script src="/js/runtime-config.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/shared-navbar.js"></script>
</head>

<body class="page-admin-category">
    <div class="navbar">
        <div class="logo" onclick="location.href='/admin/admin-dashboard.html'">Mr.A Crackers Admin</div>
        <div class="nav-links">
            <a href="/admin/admin-dashboard.html">Dashboard</a>
            <a href="/admin/admin-products.html">Products</a>
            <a href="/admin/category.html" class="active">Categories</a>
            <a href="/admin/admin-hero.html">Hero</a>
            <a href="/admin/admin-users.html">Users</a>
            <button type="button" class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <h2>Add Category</h2>
    <form id="categoryForm">
        <input name="name" placeholder="Enter Category Name (e.g. Sky Shots, Ground Chakra...)" required>
        <button type="submit" class="add-btn">Add Category</button>
    </form>

    <h2>All Categories (Total: <span id="categoryCount">0</span>)</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="categoryTable"></tbody>
        </table>
    </div>

    <script src="/js/auth-session.js"></script>
    <script src="/js/admin-navbar.js"></script>
    <script>
        function getToken() {
            const authSession = JSON.parse(localStorage.getItem("authSession") || "{}");
            return authSession?.token;
        }

        async function loadCategories() {
            try {
                const res = await fetch("/api/categories", { cache: "no-store" });
                const data = await res.json().catch(() => []);
                const rows = Array.isArray(data) ? data : [];
                const table = document.getElementById("categoryTable");
                table.innerHTML = "";
                document.getElementById("categoryCount").textContent = rows.length;

                if (!rows.length) {
                    table.innerHTML = `
                        <tr>
                            <td colspan="3" style="text-align:center;">No categories found</td>
                        </tr>
                    `;
                    return;
                }

                rows.forEach((cat) => {
                    const id = Number(cat.id) || 0;
                    const safeName = String(cat.name || "");
                    table.innerHTML += `
                        <tr>
                            <td>${id}</td>
                            <td>${safeName}</td>
                            <td><button class="edit-btn" type="button" onclick='editCategory(${id}, ${JSON.stringify(safeName)})'>Edit</button></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Category load failed:", err);
                document.getElementById("categoryTable").innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align:center;">Failed to load categories</td>
                    </tr>
                `;
            }
        }

        document.getElementById("categoryForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const name = String(this.name.value || "").trim();
            const token = getToken();

            if (!name) {
                alert("Category name is required");
                return;
            }

            try {
                const res = await fetch("/api/categories", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ name })
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    alert(data.error || data.message || "Add failed");
                    return;
                }

                alert("Category added successfully");
                this.reset();
                loadCategories();
            } catch (err) {
                console.error("Category add failed:", err);
                alert("Error adding category");
            }
        });

        async function editCategory(id, oldName) {
            const newName = prompt("Enter new name", oldName);
            if (!newName) return;

            const token = getToken();

            try {
                const res = await fetch(`/api/categories/${id}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ name: String(newName).trim() })
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    alert(data.error || data.message || "Update failed");
                    return;
                }

                alert("Updated successfully");
                loadCategories();
            } catch (err) {
                console.error("Category update failed:", err);
            }
        }

        async function logout() {
            try {
                await fetch("/api/auth/logout", { method: "POST" });
            } catch (error) {
                console.error("Logout API failed:", error);
            }

            if (window.AuthSession && typeof window.AuthSession.clear === "function") {
                window.AuthSession.clear();
            } else {
                localStorage.removeItem("authSession");
                localStorage.removeItem("token");
                localStorage.removeItem("username");
                localStorage.removeItem("mobile");
                localStorage.removeItem("role");
                localStorage.removeItem("isAdmin");
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("userId");
            }
            window.location.href = "/login.html";
        }

        loadCategories();
    </script>

</body>

</html>
