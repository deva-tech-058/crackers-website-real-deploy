    <script>
        let allProducts = [];
        let filteredProducts = [];
        let allCategories = [];
        let uploadLimitMb = 1024;

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        async function parseApiPayload(response) {
            const contentType = String(response.headers.get("content-type") || "").toLowerCase();
            if (contentType.includes("application/json")) {
                return response.json().catch(() => ({}));
            }

            if (response.status === 413) {
                return {
                    error: "Upload blocked before API (HTTP 413). Nginx/proxy file-size limit increase pannunga, app limit mattum pothathu."
                };
            }

            if (response.status === 502) {
                return {
                    error: "Backend unavailable (502 Bad Gateway). PM2/Nginx state check pannunga, then retry pannunga."
                };
            }
            if (response.status === 503) {
                return {
                    error: "Service unavailable (503). Server currently restarting or overloaded."
                };
            }
            if (response.status === 504) {
                return {
                    error: "Gateway timeout (504). Large upload or backend response timeout occurred."
                };
            }
            const text = await response.text().catch(() => "");
            return { error: text || `Request failed (${response.status})` };
        }

        function formatMegaBytes(bytes) {
            const numeric = Number(bytes) || 0;
            return (numeric / (1024 * 1024)).toFixed(2);
        }

        function validateUploadFileSize(inputId, label) {
            const input = document.getElementById(inputId);
            const file = input?.files?.[0];
            if (!file) return;

            const maxBytes = Math.max(1, Number(uploadLimitMb) || 1024) * 1024 * 1024;
            if (file.size > maxBytes) {
                throw new Error(
                    `${label} too large (${formatMegaBytes(file.size)} MB). Max allowed is ${uploadLimitMb} MB.`
                );
            }
        }

        async function loadUploadLimit() {
            try {
                const response = await fetch("/api/health", { cache: "no-store" });
                const payload = await parseApiPayload(response);
                const limit = Number.parseInt(String(payload?.upload_limit_mb || ""), 10);
                if (Number.isInteger(limit) && limit > 0) {
                    uploadLimitMb = limit;
                }
            } catch (error) {
                console.warn("Unable to fetch upload limit. Using default:", uploadLimitMb);
            }
        }

        function getProductOfferPrice(product) {
            const price = Number(product?.original_price) || 0;
            const discount = Number(product?.discount) || 0;
            return Math.max(0, Math.round(price - (price * discount) / 100));
        }

        function updateProductCount(count) {
            document.getElementById("productCount").textContent = String(count);
        }

        async function logout() {
            if (!confirm("Are you sure you want to logout?")) return;

            try {
                await fetch("/api/auth/logout", { method: "POST" });
            } catch (error) {
                console.error("Logout API failed:", error);
            }

            if (window.AuthSession && typeof window.AuthSession.clear === "function") {
                window.AuthSession.clear();
            } else {
                localStorage.removeItem("authSession");
                localStorage.removeItem("token");
                localStorage.removeItem("username");
                localStorage.removeItem("mobile");
                localStorage.removeItem("role");
                localStorage.removeItem("isAdmin");
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("userId");
            }
            window.location.href = "/login.html";
        }

        /* ================= LOAD CATEGORIES ================= */
        async function loadCategories() {
            try {
                const response = await fetch("/api/categories", { cache: "no-store" });
                const data = await parseApiPayload(response);
                allCategories = Array.isArray(data) ? data : [];
                populateCategorySelect("categorySelect");
                populateCategorySelect("editCategory");
            } catch (error) {
                console.error("Error loading categories:", error);
            }
        }

        function populateCategorySelect(id) {
            const select = document.getElementById(id);
            if (!select) return;
            select.innerHTML = '<option value="">Select Category</option>';
            allCategories.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
        }

        function openProductDetails(id) {
            const product = allProducts.find((item) => Number(item.id) === Number(id));
            if (!product) return;

            const detailsBody = document.getElementById("productDetailsBody");
            const offerPrice = getProductOfferPrice(product);
            const rows = [
                ["Product ID", product.id || "--"],
                ["Name", product.name || "--"],
                ["Category", product.category_name || "Uncategorized"],
                ["Original Price", `\u20B9${Number(product.original_price) || 0}`],
                ["Offer Price", `\u20B9${offerPrice}`],
                ["Discount", `${Number(product.discount) || 0}%`],
                ["Stock Quantity", Number(product.quantity) || 0],
                ["Best Selling", product.is_best_selling ? "Yes" : "No"],
                ["Image URL", product.image_url || "--"],
                ["Video URL", product.video_url || "--"],
            ];

            detailsBody.innerHTML = rows
                .map(([label, value]) => `<tr><th>${escapeHtml(label)}</th><td>${escapeHtml(value)}</td></tr>`)
                .join("");

            const videoWrap = document.getElementById("productDetailsVideoWrap");
            const videoPlayer = document.getElementById("productDetailsVideo");
            if (product.video_url) {
                videoPlayer.src = product.video_url;
                videoPlayer.load();
                videoWrap.style.display = "block";
            } else {
                videoPlayer.pause();
                videoPlayer.removeAttribute("src");
                videoPlayer.load();
                videoWrap.style.display = "none";
            }

            document.getElementById("productDetailsModal").style.display = "block";
        }

        function closeProductDetailsModal() {
            const modal = document.getElementById("productDetailsModal");
            const videoPlayer = document.getElementById("productDetailsVideo");
            videoPlayer.pause();
            videoPlayer.removeAttribute("src");
            videoPlayer.load();
            modal.style.display = "none";
        }

        function applyProductSearch() {
            const searchTerm = String(document.getElementById("productSearchInput").value || "")
                .trim()
                .toLowerCase();

            filteredProducts = allProducts.filter((product) => {
                if (!searchTerm) return true;
                const idMatch = String(product.id || "").toLowerCase().includes(searchTerm);
                const nameMatch = String(product.name || "").toLowerCase().includes(searchTerm);
                return idMatch || nameMatch;
            });

            renderProducts(filteredProducts);
            updateProductCount(filteredProducts.length);
        }

        function resetProductSearch() {
            document.getElementById("productSearchInput").value = "";
            applyProductSearch();
        }

        async function loadProducts() {
            try {
                const response = await fetch("/api/products", { cache: "no-store" });
                const data = await parseApiPayload(response);
                if (!Array.isArray(data)) {
                    throw new Error(data.error || "Invalid product response");
                }
                allProducts = data;
                applyProductSearch();
            } catch (error) {
                console.error("Error loading products:", error);
                const table = document.getElementById("productTable");
                table.innerHTML = `
                    <tr>
                        <td colspan="11" style="text-align:center; padding:20px;">
                            Failed to load products
                        </td>
                    </tr>`;
                updateProductCount(0);
            }
        }

        function renderProducts(products) {
            const table = document.getElementById("productTable");
            table.innerHTML = "";
            const rows = Array.isArray(products) ? products : [];

            if (!rows.length) {
                table.innerHTML = `
                <tr>
                    <td colspan="11" style="text-align:center; padding:20px;">
                        No Products Found
                    </td>
                </tr>`;
                return;
            }

            rows.forEach((p) => {
                const id = Number(p.id) || 0;
                const safeName = escapeHtml(p.name || "Unnamed Product");
                const safeImageUrl = p.image_url || "https://via.placeholder.com/50x50/1a2236/ffffff?text=?";
                const offer = getProductOfferPrice(p);

                table.innerHTML += `
                <tr>
                    <td>${id}</td>
                    <td>
                        <img src="${safeImageUrl}" 
                             alt="${safeName}" 
                             onerror="this.src='https://via.placeholder.com/50x50/1a2236/ffffff?text=?';">
                    </td>
                    <td>
                        ${p.video_url
                        ? `<button class="video-icon-btn" title="View video details" onclick="openProductDetails(${id})"><i class="fas fa-circle-play"></i></button>`
                        : `<span class="not-selling">--</span>`}
                    </td>
                    <td title="${safeName}">${safeName}</td>
                    <td>${escapeHtml(p.category_name ?? "Uncategorized")}</td>
                    <td><span class="price">\u20B9${Number(p.original_price) || 0}</span></td>
                    <td><span class="offer-price">\u20B9${offer}</span></td>
                    <td><span class="discount">${Number(p.discount) || 0}%</span></td>
                    <td>${Number(p.quantity) || 0}</td>
                    <td>
                        <span class="${p.is_best_selling ? 'best-selling' : 'not-selling'}">
                            ${p.is_best_selling ? 'YES' : 'NO'}
                        </span>
                    </td>
                    <td class="actions">
                        <button class="view-btn" onclick="openProductDetails(${id})">View</button>
                        <button class="edit-btn" onclick="editProduct(${id})">Edit</button>
                        <button class="delete-btn" onclick="deleteProduct(${id})">Delete</button>
                    </td>
                </tr>`;
            });
        }

        const productForm = document.getElementById("productForm");
        if (productForm) {
            productForm.addEventListener("submit", async function (e) {
                e.preventDefault();
                const formData = new FormData(this);

                try {
                    validateUploadFileSize("addImageFile", "Product image");
                    validateUploadFileSize("addVideoFile", "Product video");

                    const response = await fetch("/api/products", { method: "POST", body: formData });
                    const body = await parseApiPayload(response);
                    if (!response.ok) {
                        throw new Error(body.error || body.message || "Error adding product");
                    }
                    this.reset();
                    await loadProducts();
                    alert("Product added successfully!");
                } catch (err) {
                    console.error("Error:", err);
                    alert(err.message || "Error adding product!");
                }
            });
        }

        async function deleteProduct(id) {
            if (!confirm("Are you sure you want to delete this product?")) return;

            try {
                const response = await fetch(`/api/products/${id}`, { method: "DELETE" });
                const body = await parseApiPayload(response);
                if (!response.ok) {
                    throw new Error(body.error || body.message || "Error deleting product");
                }
                await loadProducts();
                alert("Product deleted successfully!");
            } catch (err) {
                console.error("Error:", err);
                alert(err.message || "Error deleting product!");
            }
        }

        function editProduct(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;

            document.getElementById("editProductId").value = id;
            document.getElementById("editName").value = p.name;
            document.getElementById("editPrice").value = p.original_price;
            document.getElementById("editDiscount").value = p.discount;
            document.getElementById("editQty").value = p.quantity;
            document.getElementById("editCategory").value = p.category_id || "";
            document.getElementById("editBestSelling").checked = p.is_best_selling;
            document.getElementById("editModal").style.display = "block";
        }

        function closeEditModal() {
            document.getElementById("editModal").style.display = "none";
            document.getElementById("editForm").reset();
        }

        document.getElementById("editForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const id = document.getElementById("editProductId").value;

            try {
                validateUploadFileSize("editImageFile", "Product image");
                validateUploadFileSize("editVideoFile", "Product video");

                const response = await fetch(`/api/products/${id}`, { method: "PUT", body: formData });
                const body = await parseApiPayload(response);
                if (!response.ok) {
                    throw new Error(body.error || body.message || "Error updating product");
                }
                await loadProducts();
                closeEditModal();
                alert("Product updated successfully!");
            } catch (err) {
                console.error("Error:", err);
                alert(err.message || "Error updating product!");
            }
        });

        window.onclick = function (e) {
            if (e.target == document.getElementById("editModal")) closeEditModal();
            if (e.target == document.getElementById("videoPreviewModal")) closeVideoModal();
            if (e.target == document.getElementById("productDetailsModal")) closeProductDetailsModal();
        };

        function previewVideo(encodedUrl) {
            const decodedUrl = decodeURIComponent(encodedUrl || "");
            if (!decodedUrl) return;

            const modal = document.getElementById("videoPreviewModal");
            const player = document.getElementById("previewVideoPlayer");
            player.src = decodedUrl;
            player.load();
            modal.style.display = "block";
        }

        function closeVideoModal() {
            const modal = document.getElementById("videoPreviewModal");
            const player = document.getElementById("previewVideoPlayer");
            player.pause();
            player.removeAttribute("src");
            player.load();
            modal.style.display = "none";
        }

        document.getElementById("productSearchInput").addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                applyProductSearch();
            }
        });

        window.onload = async function () {
            await loadUploadLimit();
            await Promise.all([loadCategories(), loadProducts()]);
        };
    </script>
</body>

</html>
