<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Mr.A Crackers</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Golden/Purple Theme Variables */
    :root {
      --bg-primary: #0a0f1e;
      --bg-secondary: #151e2f;
      --bg-card: #1a2538;
      --text-primary: #ffffff;
      --text-secondary: #e2e8f0;
      --text-muted: #a0b3d9;
      --border-color: #2d3a5e;
      --accent-gold: #fbbf24;
      --accent-purple: #c084fc;
      --accent-gradient: linear-gradient(135deg, #fbbf24 0%, #c084fc 100%);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --input-bg: #0f172a;
      --dark-bg: #0a0a1a;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Sparkle Background */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      animation: sparkle 40s linear infinite;
      opacity: 0.15;
      z-index: -1;
    }

    @keyframes sparkle {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(-500px, -500px);
      }
    }

    /* Navbar - exact same as previous pages */
    .navbar {
      background: var(--bg-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 40px;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 70px;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      line-height: 1;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .nav-item {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.3s;
      line-height: 1;
    }

    .nav-item:hover {
      color: var(--accent-gold);
    }

    .nav-item.active {
      color: var(--accent-gold);
      position: relative;
    }

    .nav-item.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-gradient);
      border-radius: 2px;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 25px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      text-decoration: none;
    }

    .nav-login-btn {
      background: var(--accent-gradient);
      color: var(--bg-primary) !important;
      font-weight: 600;
    }

    .nav-login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
    }

    .nav-logout-btn {
      background: var(--danger);
      color: white !important;
      border: none !important;
      outline: none !important;
    }

    .nav-logout-btn:hover {
      background: #dc2626;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent !important;
    }

    .welcome-user {
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1;
      background: transparent !important;
      padding: 0 !important;
    }

    /* Cart and Orders icons - clean, no circles */
    .cart,
    .orders {
      position: relative;
      cursor: pointer;
      display: inline-block;
      color: #fff !important;
      transition: all 0.4s ease;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      margin: 0 !important;
      width: auto !important;
      height: auto !important;
      line-height: 1;
      text-decoration: none;
      box-shadow: none !important;
      outline: none !important;
      border-radius: 0 !important;
    }

    .cart i,
    .orders i {
      font-size: 24px !important;
      line-height: 1;
      display: block;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .cart:hover i,
    .orders:hover i {
      color: var(--accent-gold) !important;
      transform: scale(1.1) translateY(-2px);
    }

    /* Remove any pseudo-elements */
    .cart::before,
    .cart::after,
    .orders::before,
    .orders::after {
      display: none !important;
      content: none !important;
    }

    .cart-count,
    .orders-count {
      position: absolute;
      top: -10px;
      right: -12px;
      background: var(--accent-gradient) !important;
      color: #000 !important;
      font-size: 10px;
      font-weight: 800;
      min-width: 18px;
      height: 18px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--dark-bg);
      line-height: 1;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    /* Main Content */
    .center-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Auth Card - Golden/Pink Theme */
    .card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    .auth-card h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .subtitle {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* Auth Switch Tabs */
    .auth-switch {
      display: flex;
      gap: 10px;
      background: var(--bg-secondary);
      padding: 5px;
      border-radius: 40px;
      margin-bottom: 30px;
      border: 1px solid var(--border-color);
    }

    .switch-btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      border-radius: 30px;
      transition: all 0.3s;
      font-family: "Poppins", sans-serif;
    }

    .switch-btn.active {
      background: var(--accent-gradient);
      color: var(--bg-primary);
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
    }

    /* Form Message */
    .form-message {
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .form-message.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
      display: block;
    }

    .form-message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      display: block;
    }

    /* Forms */
    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: "Poppins", sans-serif;
      transition: all 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
      font-size: 14px;
    }

    .field-error {
      display: block;
      margin-top: 5px;
      color: var(--danger);
      font-size: 12px;
      min-height: 18px;
    }

    /* Submit Button */
    #loginSubmitBtn,
    #registerSubmitBtn {
      width: 100%;
      padding: 14px;
      background: var(--accent-gradient);
      color: var(--bg-primary);
      font-weight: 600;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    #loginSubmitBtn:hover,
    #registerSubmitBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(251, 191, 36, 0.4);
    }

    #loginSubmitBtn:disabled,
    #registerSubmitBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 14px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar {
        padding: 12px 25px;
        height: 60px;
      }

      .nav-links {
        gap: 15px;
      }

      .nav-item {
        font-size: 14px;
      }

      .logo {
        font-size: 22px;
      }

      .cart i,
      .orders i {
        font-size: 22px !important;
      }

      .card {
        padding: 30px 20px;
      }

      .auth-card h1 {
        font-size: 28px;
      }
    }

    @media (max-width: 576px) {
      .navbar {
        padding: 10px 20px;
        height: 55px;
      }

      .nav-links {
        gap: 12px;
      }

      .nav-item:not(.active):not(.btn) {
        display: none;
      }

      .logo {
        font-size: 20px;
      }

      .cart i,
      .orders i {
        font-size: 20px !important;
      }

      .cart-count,
      .orders-count {
        min-width: 16px;
        height: 16px;
        font-size: 9px;
        top: -8px;
        right: -10px;
      }

      .welcome-user {
        display: none;
      }

      .card {
        padding: 25px 15px;
      }

      .auth-card h1 {
        font-size: 24px;
      }

      .switch-btn {
        padding: 10px 15px;
        font-size: 14px;
      }

      .input-group input {
        padding: 12px 14px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-gold);
    }
  </style>
    <link rel="stylesheet" href="/css/theme.css">
    <script src="/js/runtime-config.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/shared-navbar.js"></script>
</head>

<body class="page-login">
  <!-- Navbar - exact same as previous pages -->
  <nav class="navbar">
    <a class="logo" href="/">Mr.A Crackers</a>
    <div class="nav-links">
      <a href="/" class="nav-item">Home</a>
      <a href="/all-products.html" class="nav-item">Products</a>
      <a href="/login.html" id="loginLink" class="btn nav-login-btn">Login</a>
      <div class="user-section" id="userSection" hidden>
        <span id="welcomeUser" class="welcome-user"></span>
        <button id="logoutBtn" type="button" class="btn nav-logout-btn">Logout</button>
      </div>
      <a href="/order-details.html" class="orders" aria-label="Orders">
        <i class="fa-solid fa-box-open"></i>
        <span class="orders-count" id="ordersCount" style="display: none;">0</span>
      </a>
      <a href="/checkout.html" class="cart" aria-label="Cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </nav>

  <main class="center-wrapper">
    <section class="card auth-card">
      <h1>Account Access</h1>
      <p class="subtitle">Login or create your account to continue.</p>

      <div class="auth-switch" role="tablist" aria-label="Authentication tabs">
        <button id="loginTabBtn" class="switch-btn active" type="button" role="tab" aria-selected="true">
          Login
        </button>
        <button id="registerTabBtn" class="switch-btn" type="button" role="tab" aria-selected="false">
          Register
        </button>
      </div>

      <p id="formMessage" class="form-message" aria-live="polite"></p>

      <form id="loginForm" class="auth-form active" novalidate>
        <div class="input-group">
          <label for="loginMobile">Mobile Number</label>
          <input id="loginMobile" name="mobile" type="tel" inputmode="numeric" maxlength="10"
            placeholder="Enter 10 digit mobile number" autocomplete="tel" required />
          <small class="field-error"></small>
        </div>

        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" minlength="8" maxlength="64"
            placeholder="Enter your password" autocomplete="current-password" required />
          <small class="field-error"></small>
        </div>

        <button id="loginSubmitBtn" type="submit" class="btn">Login</button>
      </form>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="registerName">Full Name</label>
          <input id="registerName" name="name" type="text" minlength="2" maxlength="80"
            placeholder="Enter your full name" autocomplete="name" required />
          <small class="field-error"></small>
        </div>

        <div class="input-group">
          <label for="registerMobile">Mobile Number</label>
          <input id="registerMobile" name="mobile" type="tel" inputmode="numeric" maxlength="10"
            placeholder="Enter 10 digit mobile number" autocomplete="tel" required />
          <small class="field-error"></small>
        </div>

        <div class="input-group">
          <label for="registerPassword">Password</label>
          <input id="registerPassword" name="password" type="password" minlength="8" maxlength="64"
            placeholder="At least 8 chars with upper, lower, number, special" autocomplete="new-password" required />
          <small class="field-error"></small>
        </div>

        <div class="input-group">
          <label for="registerConfirmPassword">Confirm Password</label>
          <input id="registerConfirmPassword" name="confirm_password" type="password" minlength="8" maxlength="64"
            placeholder="Re-enter your password" autocomplete="new-password" required />
          <small class="field-error"></small>
        </div>

        <button id="registerSubmitBtn" type="submit" class="btn">Create Account</button>
      </form>
    </section>
  </main>

  <footer class="footer">Secure login for Mr.A Crackers customers</footer>

  <script src="/js/auth-session.js"></script>
  <script src="/js/navbar-auth.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    // Tab switching functionality
    document.addEventListener('DOMContentLoaded', function () {
      const loginTab = document.getElementById('loginTabBtn');
      const registerTab = document.getElementById('registerTabBtn');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      loginTab.addEventListener('click', function () {
        loginTab.classList.add('active');
        loginTab.setAttribute('aria-selected', 'true');
        registerTab.classList.remove('active');
        registerTab.setAttribute('aria-selected', 'false');
        loginForm.classList.add('active');
        registerForm.classList.remove('active');

        // Clear any messages
        document.getElementById('formMessage').className = 'form-message';
        document.getElementById('formMessage').textContent = '';
      });

      registerTab.addEventListener('click', function () {
        registerTab.classList.add('active');
        registerTab.setAttribute('aria-selected', 'true');
        loginTab.classList.remove('active');
        loginTab.setAttribute('aria-selected', 'false');
        registerForm.classList.add('active');
        loginForm.classList.remove('active');

        // Clear any messages
        document.getElementById('formMessage').className = 'form-message';
        document.getElementById('formMessage').textContent = '';
      });

      // Update cart count
      if (window.CartUtils) {
        const cart = window.CartUtils.getCart();
        const totalItems = window.CartUtils.getSummary(cart).totalItems;
        document.getElementById('cartCount').textContent = totalItems;
      }
    });
  </script>
</body>

</html>
